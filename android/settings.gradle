pluginManagement {
    repositories {
        gradlePluginPortal()  // For Gradle plugin resolution
        google()              // Google's Maven repository
        mavenCentral()        // Maven Central for other dependencies
    }
    includeBuild('../node_modules/@react-native/gradle-plugin')  // Ensure the React Native Gradle plugin is included
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT) // Ensures all dependencies come from repositories, not local project repos
     repositories {
        google()
        mavenCentral()
        jcenter() // Warning: this repository is going to shut down soon
    }
}

rootProject.name = 'HexaHavenSmartHomeApp' // Name of the project

// Include the main app module
include ':app'

// Manually include @react-native-community/slider if necessary (auto-linking should generally handle this)
include ':@react-native-community_slider'
project(':@react-native-community_slider').projectDir = new File(rootProject.projectDir, '../node_modules/@react-native-community/slider/android')
